plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.obedkm.mandarinjourney'
    compileSdk 34

    defaultConfig {
        applicationId 'com.obedkm.mandarinjourney'
        minSdk 24
        targetSdk 34
        versionCode 4
        versionName '0.4'
    }

    signingConfigs {
        release {
            storeFile file('../keystore.p12')
            storeType 'PKCS12'
            storePassword 'mandarin-journey'
            keyAlias 'mj'
            keyPassword 'mandarin-journey'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}
