name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Normalize keystore (convert legacy PKCS12 if Java cannot read it)
        run: |
          if ! keytool -list -keystore android/keystore.p12 -storetype PKCS12 -storepass mandarin-journey > /dev/null 2>&1; then
            echo "Converting legacy keystore..."
            openssl pkcs12 -in android/keystore.p12 -passin pass:mandarin-journey -legacy -nodes -out /tmp/kc.pem
            openssl pkcs12 -export -in /tmp/kc.pem -out android/keystore.p12 -name mj -passout pass:mandarin-journey
            rm /tmp/kc.pem
            keytool -list -keystore android/keystore.p12 -storetype PKCS12 -storepass mandarin-journey
          fi

      - name: Copy web app into WebView assets
        run: |
          mkdir -p android/app/src/main/assets/www
          cp -r index.html css js vendor android/app/src/main/assets/www/

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build release APK
        run: gradle -p android assembleRelease --no-daemon

      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk mandarin-journey.apk

      - uses: actions/upload-artifact@v4
        with:
          name: mandarin-journey-apk
          path: mandarin-journey.apk

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Mandarin Journey — latest build
          body: |
            Sideloadable Android APK, rebuilt automatically from the newest commit.
            Download `mandarin-journey.apk` below, open it on your phone, and allow
            "install from unknown sources" when prompted.
          files: mandarin-journey.apk
